<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalrusBoard — Decentralized Social on Sui</title>
    <!-- Official Mysten Labs SDK Library -->
    <script src="https://unpkg.com"></script>
    <link rel="preconnect" href="https://googleapis.com">
    <link href="https://googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0a0c0f;
        --bg2: #111318;
        --bg3: #181c24;
        --bg4: #1e2330;
        --border: rgba(255,255,255,0.07);
        --border2: rgba(255,255,255,0.13);
        --text: #e8eaf2;
        --text2: #8b92a8;
        --text3: #555e74;
        --accent: #4f9eff;
        --accent2: #2d7de0;
        --walrus: #00e5c8;
        --sui: #4da2ff;
        --tatum: #a78bfa;
        --success: #34d399;
        --mono: 'Space Mono', monospace;
        --sans: 'DM Sans', sans-serif;
        --r: 8px;
        --r2: 12px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(79,158,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(79,158,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10,12,15,0.9);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .logo {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 28px; height: 28px;
        background: linear-gradient(135deg, var(--walrus), var(--accent));
        border-radius: 6px;
      }
      .nav-badges { display: flex; gap: 8px; }
      .badge {
        font-family: var(--mono);
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
      }
      .badge-walrus { background: rgba(0,229,200,0.1); color: var(--walrus); border: 1px solid rgba(0,229,200,0.2); }
      .badge-tatum { background: rgba(167,139,250,0.1); color: var(--tatum); border: 1px solid rgba(167,139,250,0.2); }
      .app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: calc(100vh - 56px);
      }
      .sidebar-left {
        border-right: 1px solid var(--border);
        padding: 1.5rem 1rem;
      }
      .wallet-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--r2);
        padding: 1rem;
      }
      .wallet-address {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        margin-bottom: 6px;
        word-break: break-all;
      }
      .wallet-balance {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .wallet-balance span { font-size: 13px; color: var(--text2); }
      .main { padding: 1.5rem; }
      .compose-box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--r2);
        padding: 1rem;
      }
      .compose-textarea {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 15px;
        resize: none;
        min-height: 80px;
      }
      .compose-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .btn-post {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: var(--r);
        cursor: pointer;
        font-weight: 500;
        transition: background 0.15s;
      }
      .btn-post:hover { background: var(--accent2); }
      .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }
      .storage-opt {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
        font-family: var(--mono);
        color: var(--text2);
        display: inline-block;
        margin-top: 10px;
      }
      .char-count { font-family: var(--mono); font-size: 11px; color: var(--text3); }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><div class="logo-icon"></div>WalrusBoard</div>
        <div class="nav-badges">
            <span class="badge badge-walrus">WALRUS SECURED</span>
            <span class="badge badge-tatum">TATUM RPC</span>
        </div>
    </nav>

    <div class="app">
        <div class="sidebar-left">
            <div class="wallet-card">
                <div class="wallet-address" id="wallet-addr">Disconnected</div>
                <div class="wallet-balance" id="wallet-bal">0.00 <span>SUI</span></div>
                <button id="btn-connect" class="btn-post" style="width:100%;">Connect Wallet</button>
            </div>
        </div>

        <div class="main">
            <div class="compose-box">
                <textarea id="post-text" class="compose-textarea" placeholder="What's happening in the decentralized world?"></textarea>
                <input type="file" id="media-upload" style="display: none;" />
                
                <div>
                    <div class="storage-opt" id="trigger-file-select">📎 Attach Media Asset</div>
                </div>

                <div class="compose-footer">
                    <span class="char-count" id="status-log">System: Ready</span>
                    <button id="btn-submit-post" class="btn-post" disabled>Publish to Mainnet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            TATUM_RPC: "https://tatum.io", 
            TATUM_KEY: "t-6a228ba6cdca2ce164fe3516-29b78c633b8c45008f38baff", 
            WALRUS_PUBLISHER: "https://walrus.space",
            PACKAGE_ID: "0x53a152fb6a19280d9db81d6f47f20108398e6c7104ea20299837c7bd9676ec4f", 
            MODULE_NAME: "social",
            FUNCTION_NAME: "create_post"
        };

        let currentWalletFeatureInstance = null;
        let walletAccount = null;
        let selectedFile = null;

        document.getElementById('trigger-file-select').addEventListener('click', () => {
            document.getElementById('media-upload').click();
        });

        document.getElementById('media-upload').addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files;
                document.getElementById('status-log').innerText = `System: Asset - ${selectedFile.name}`;
            }
        });

        // ADVANCED EVENT-DRIVEN DETECTION FOR EXTENSIONS
        function scanForSuiStandardWallets() {
            // Check traditional endpoints
            if (window.suiWallet || window.slushWallet) {
                return window.suiWallet || window.slushWallet;
            }
            // Fallback scan loop for the modern dynamic registry list
            if (window.__suiWallets && typeof window.__suiWallets.get === 'function') {
                const registered = window.__suiWallets.get();
                if (registered && registered.length > 0) {
                    // Grab the first registered extension (Slush)
                    return registered[0];
                }
            }
            return null;
        }

        // Listen live for the register event triggered by Slush loading
        window.addEventListener('sui-wallet-standard:register-wallet', () => {
            console.log("Sui Wallet Standard Event Captured.");
            document.getElementById('status-log').innerText = "System: Slush Detected!";
        });

        document.getElementById('btn-connect').addEventListener('click', async () => {
            currentWalletFeatureInstance = scanForSuiStandardWallets();
            
            if (currentWalletFeatureInstance) {
                try {
                    document.getElementById('status-log').innerText = "System: Triggering Pop-up Prompt...";
                    
                    let accounts = [];
                    // Execute standard connection handshake method definition loops
                    if (typeof currentWalletFeatureInstance.connect === 'function') {
                        const connectionResult = await currentWalletFeatureInstance.connect();
                        accounts = connectionResult.accounts || connectionResult;
                    } else if (typeof currentWalletFeatureInstance.requestPermissions === 'function') {
                        await currentWalletFeatureInstance.requestPermissions();
                        accounts = await currentWalletFeatureInstance.getAccounts();
                    }

                    // Normalize data matching string profiles
                    const targetedDataArray = Array.isArray(accounts) ? accounts[0] : accounts;
